<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SBI YONO SafeGuard</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
        }
        .logo {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo h2 {
            margin: 5px 0;
            font-size: 18px;
        }
        .logo p {
            font-size: 12px;
            opacity: 0.9;
            margin: 0;
        }
        .status {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .status-safe {
            background: #4caf50;
        }
        .status-danger {
            background: #f44336;
        }
        .check-section {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #0066b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00509e;
        }
        .tips {
            font-size: 11px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 10px;
        }
        .tips h4 {
            margin: 0 0 5px 0;
            font-size: 12px;
        }
        .tips ul {
            margin: 0;
            padding-left: 15px;
        }
        .tips li {
            margin-bottom: 3px;
        }
        .result {
            margin-top: 10px;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
        }
        .result-safe {
            background: #4caf50;
        }
        .result-danger {
            background: #f44336;
        }
        .loading {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <h2>🛡️ SBI YONO SafeGuard</h2>
        <p>Protecting you from fake apps</p>
    </div>
    
    <div class="status" id="status">
        ✅ Active & Protecting
    </div>
    
    <div class="check-section">
        <input type="text" id="urlInput" placeholder="Paste suspicious link here...">
        <button id="checkBtn">Check URL Safety</button>
    </div>
    
    <div id="result"></div>
    
    <div class="tips">
        <h4>🔒 Quick Safety Tips:</h4>
        <ul>
            <li>✅ Download YONO only from official app stores</li>
            <li>✅ Never share OTP/MPIN with anyone</li>
            <li>✅ Check for "https://sbi.co.in" in URLs</li>
            <li>✅ Report suspicious links instantly</li>
        </ul>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
